<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymptomAid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Teal Medical Theme */
            --bg-color: #F0FDFA; /* Soft mint/teal */
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #475569;
            --primary-color: #0D9488; /* Teal 600 */
            --primary-hover: #0F766E; /* Teal 700 */
            --border-color: #CCFBF1; /* Teal 100 */
            --focus-ring: rgba(13, 148, 136, 0.25);
            
            /* Urgency Colors */
            --urgency-emergency-bg: #FEF2F2;
            --urgency-emergency-text: #DC2626; /* Red */
            --urgency-clinic-bg: #FEF9C3;
            --urgency-clinic-text: #CA8A04; /* Yellow/Orange */
            --urgency-home-bg: #F0FDF4;
            --urgency-home-text: #16A34A; /* Green */

            /* Geometry */
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 9999px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(20, 184, 166, 0.1), 0 2px 4px -1px rgba(20, 184, 166, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(20, 184, 166, 0.15), 0 4px 6px -2px rgba(20, 184, 166, 0.05);
            
            /* Transitions */
            --transition-fast: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--primary-color);
        }

        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary-color);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-fast);
        }

        .lang-toggle:hover {
            border-color: var(--primary-color);
            background: #F0FDFA;
            transform: translateY(-1px);
        }

        .lang-toggle:active {
            transform: translateY(0);
        }

        /* Main Card */
        .main-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: box-shadow var(--transition-fast);
            border: 1px solid rgba(13, 148, 136, 0.1);
        }

        .main-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .section-title {
            display: block;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* Input Area */
        .symptom-textarea {
            width: 100%;
            min-height: 160px;
            padding: 16px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: all var(--transition-fast);
            background-color: #F8FAFC;
        }

        .symptom-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .symptom-textarea::placeholder {
            color: #94A3B8;
        }

        /* Buttons */
        .primary-btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 6px rgba(13, 148, 136, 0.3);
        }

        .primary-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(13, 148, 136, 0.4);
        }

        .primary-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(13, 148, 136, 0.3);
        }

        .secondary-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #CBD5E1;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .secondary-btn:hover {
            background-color: #F8FAFC;
            color: var(--text-main);
            border-color: #94A3B8;
        }

        /* Results Section */
        .results-divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 8px 0 24px 0;
        }

        .hidden {
            display: none !important;
        }

        .urgency-container {
            display: flex;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .urgency-label {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .badge {
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow-sm);
        }

        /* Badge Variants */
        .badge.emergency {
            background-color: var(--urgency-emergency-bg);
            color: var(--urgency-emergency-text);
            border: 1px solid #FECACA;
        }
        .badge.clinic {
            background-color: var(--urgency-clinic-bg);
            color: var(--urgency-clinic-text);
            border: 1px solid #FEF08A; /* yellow border */
        }
        .badge.home {
            background-color: var(--urgency-home-bg);
            color: var(--urgency-home-text);
            border: 1px solid #BBF7D0;
        }

        .advice-card {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-left: 4px solid var(--primary-color);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        .advice-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .advice-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Footer */
        .app-footer {
            margin-top: auto;
            padding: 16px 0;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        /* Animations */
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .app-container {
                padding: 12px;
                gap: 16px;
            }
            .main-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <!-- Health/Heart Icon -->
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    <path d="M12 9v6"></path>
                    <path d="M9 12h6"></path>
                </svg>
                <h1 id="app-title">SymptomAid</h1>
            </div>
            <button class="lang-toggle" id="lang-toggle">
                <span class="lang-text">தமிழ்</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            </button>
        </header>

        <!-- API Setup Screen -->
        <main class="main-card hidden" id="api-setup-main">
            <h2 class="section-title">Welcome to SymptomAid</h2>
            <p class="subtitle">Please enter your Gemini API key to get started.</p>
            <p class="subtitle" style="margin-top: -10px; font-size: 0.85rem;">
                Get your free key at <a href="https://aistudio.google.com" target="_blank" style="color: var(--primary-color); font-weight: 500;">aistudio.google.com</a>
            </p>
            
            <input type="password" id="api-key-input" class="symptom-textarea" style="min-height: auto; padding: 12px; margin-bottom: 8px;" placeholder="e.g., AIzaSy...">
            
            <button id="save-key-btn" class="primary-btn">
                <span>Save Key</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            </button>
        </main>

        <!-- Main Content (Input) -->
        <main class="main-card hidden" id="app-main">
            <div class="input-section">
                <label for="symptom-input" id="label-symptoms" class="section-title">Describe your symptoms</label>
                <p class="subtitle" id="subtitle-symptoms">Please be as detailed as possible so we can help you better.</p>
                <textarea id="symptom-input" class="symptom-textarea" placeholder="e.g., I have had a high fever and severe headache since yesterday morning..."></textarea>
                <button id="check-btn" class="primary-btn">
                    <span id="btn-text">Check Symptoms</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <!-- Results Section (Hidden by default) -->
            <div id="results-section" class="results-section hidden">
                <div class="results-divider"></div>
                <h2 class="section-title" id="results-title">Assessment Results</h2>
                
                <div class="urgency-container">
                    <span class="urgency-label" id="urgency-label">Urgency Level:</span>
                    <span id="urgency-badge" class="badge"></span>
                </div>

                <div class="advice-card">
                    <h3 class="advice-title" id="advice-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                        AI Advice
                    </h3>
                    <p id="advice-text" class="advice-text"></p>
                </div>

                <button id="reset-btn" class="secondary-btn">
                    <span id="reset-text">Start Over</span>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p id="footer-text">This is not a substitute for professional medical advice.</p>
            <p style="margin-top: 10px;">
                <button id="change-key-btn" style="background:none;border:none;color:var(--primary-color);text-decoration:underline;cursor:pointer;font-size:0.85rem;">Change API Key</button>
            </p>
        </footer>
    </div>

    <script>
        // Elements
        const langToggleBtn = document.getElementById('lang-toggle');
        const langText = document.querySelector('.lang-text');
        const checkBtn = document.getElementById('check-btn');
        const symptomInput = document.getElementById('symptom-input');
        const resultsSection = document.getElementById('results-section');
        const resetBtn = document.getElementById('reset-btn');
        const urgencyBadge = document.getElementById('urgency-badge');
        const adviceText = document.getElementById('advice-text');

        // Translatable elements
        const elAppTitle = document.getElementById('app-title');
        const elLabelSymptoms = document.getElementById('label-symptoms');
        const elSubtitleSymptoms = document.getElementById('subtitle-symptoms');
        const elBtnText = document.getElementById('btn-text');
        const elResultsTitle = document.getElementById('results-title');
        const elUrgencyLabel = document.getElementById('urgency-label');
        const elAdviceTitle = document.getElementById('advice-title');
        const elResetText = document.getElementById('reset-text');
        const elFooterText = document.getElementById('footer-text');

        let isTamil = false;

        // Gemini API Configuration
        const SYSTEM_PROMPT = `You are a medical assistant AI. When a user describes symptoms, you MUST respond in this exact format:

🔍 Possible Conditions:
- List 2-3 likely conditions based on the symptoms

🏠 Home Remedies:
- List specific remedies for each condition

⚠️ See a Doctor If:
- List specific warning signs

📋 Disclaimer: This is not a substitute for professional medical advice.

Be specific and detailed. For example, if someone says headache + nausea + cold, mention possibilities like viral fever, common cold, flu, or migraine. Never give vague generic responses.`;

        // Dictionaries
        const dict = {
            en: {
                toggleText: "தமிழ்",
                title: "SymptomAid",
                label: "Describe your symptoms",
                subtitle: "Please be as detailed as possible so we can help you better.",
                placeholder: "e.g., I have had a high fever and severe headache since yesterday morning...",
                btnCheck: "Check Symptoms",
                resultsTitle: "Assessment Results",
                urgencyLabel: "Urgency Level:",
                adviceTitle: "AI Advice",
                btnReset: "Start Over",
                urgencyWait: "Checking...",
                emptyInputError: "Please enter your symptoms to get an assessment.",
                footer: "This is not a substitute for professional medical advice."
            },
            ta: {
                toggleText: "English",
                title: "சிம்டம் எய்டு", // SymptomAid
                label: "உங்கள் அறிகுறிகளை விவரிக்கவும்",
                subtitle: "நாங்கள் உங்களுக்கு சிறந்த முறையில் உதவ, தயவுசெய்து விரிவாகக் கூறவும்.",
                placeholder: "உதாரணமாக, நேற்றிலிருந்து எனக்கு அதிக காய்ச்சலும் கடுமையான தலைவலியும் உள்ளது...",
                btnCheck: "அறிகுறிகளைச் சரிபார்க்கவும்",
                resultsTitle: "மதிப்பீட்டு முடிவுகள்",
                urgencyLabel: "அவசர நிலை:",
                adviceTitle: "AI ஆலோசனை",
                btnReset: "மீண்டும் தொடங்குக",
                urgencyWait: "சரிபார்க்கிறது...",
                emptyInputError: "தயவுசெய்து உங்கள் அறிகுறிகளை உள்ளிடவும்.",
                footer: "இது தொழில்முறை மருத்துவ ஆலோசனைக்கு மாற்றாகாது."
            }
        };

        // Mock Results generator based on input length or keywords
        function getMockResult(text) {
            const lowerText = text.toLowerCase();
            let type = 'clinic'; // default
            
            // Simple mock logic
            if (lowerText.includes('chest pain') || lowerText.includes('breathing') || lowerText.includes('நெஞ்சு வலி') || lowerText.includes('மூச்சுச்சுழற்சி')) {
                type = 'emergency';
            } else if (lowerText.includes('fever') || lowerText.includes('காய்ச்சல்')) {
                type = 'clinic';
            } else if (lowerText.includes('cold') || lowerText.includes('cough') || lowerText.includes('இருமல்') || lowerText.includes('சளி')) {
                type = 'home';
            } else {
                // Randomly pick one for demo purposes if no clear keyword
                const types = ['home', 'clinic', 'emergency'];
                type = types[Math.floor(Math.random() * types.length)];
            }

            const responses = {
                en: {
                    emergency: {
                        level: 'Emergency',
                        advice: 'Your symptoms suggest a potentially serious medical condition. Please visit the nearest hospital emergency room immediately or call an ambulance.'
                    },
                    clinic: {
                        level: 'Visit Clinic',
                        advice: 'Your symptoms should be evaluated by a healthcare professional. Please schedule an appointment with a nearby clinic or doctor within the next 24-48 hours.'
                    },
                    home: {
                        level: 'Home Remedy',
                        advice: 'Your symptoms appear to be mild. Rest, stay hydrated, and try standard home remedies. If symptoms persist for more than 3 days or worsen, please consult a doctor.'
                    }
                },
                ta: {
                    emergency: {
                        level: 'அவசரம்',
                        advice: 'உங்கள் அறிகுறிகள் கடுமையான மருத்துவ நிலையைக் குறிக்கின்றன. தயவுசெய்து உடனடியாக அருகிலுள்ள மருத்துவமனை அவசரநிலைக்குச் செல்லவும் அல்லது ஆம்புலன்ஸை அழைக்கவும்.'
                    },
                    clinic: {
                        level: 'மருத்துவ நிலையத்திற்குச் செல்லவும்',
                        advice: 'உங்கள் அறிகுறிகளை ஒரு மருத்துவர் மதிப்பீடு செய்ய வேண்டும். தயவுசெய்து அடுத்த 24-48 மணி நேரத்திற்குள் மருத்துவரை அணுகவும்.'
                    },
                    home: {
                        level: 'வீட்டு வைத்தியம்',
                        advice: 'உங்கள் அறிகுறிகள் லேசானவை. ஓய்வெடுக்கவும், தண்ணீர் நிறைய குடிக்கவும், வீட்டு வைத்தியங்களை முயற்சிக்கவும். 3 நாட்களுக்கு மேல் நீடித்தால் மருத்துவரை அணுகவும்.'
                    }
                }
            };

            const langKey = isTamil ? 'ta' : 'en';
            return {
                type: type,
                level: responses[langKey][type].level,
                advice: responses[langKey][type].advice
            };
        }

        // Language Toggle functionality
        langToggleBtn.addEventListener('click', () => {
            isTamil = !isTamil;
            updateLanguage();
            // If results are open, update them too
            if (!resultsSection.classList.contains('hidden')) {
                handleCheck(false); // Re-run mock check to update text
            }
        });

        function updateLanguage() {
            const lang = isTamil ? 'ta' : 'en';
            const d = dict[lang];

            langText.textContent = d.toggleText;
            elAppTitle.textContent = d.title;
            elLabelSymptoms.textContent = d.label;
            elSubtitleSymptoms.textContent = d.subtitle;
            symptomInput.placeholder = d.placeholder;
            elBtnText.textContent = d.btnCheck;
            elResultsTitle.textContent = d.resultsTitle;
            elUrgencyLabel.textContent = d.urgencyLabel;
            
            // advice title needs to preserve the icon
            elAdviceTitle.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg> ${d.adviceTitle}`;
            
            elResetText.textContent = d.btnReset;
            elFooterText.textContent = d.footer;
        }

        // Setup API Key Logic
        const elApiSetupMain = document.getElementById('api-setup-main');
        const elAppMain = document.getElementById('app-main');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const changeKeyBtn = document.getElementById('change-key-btn');

        function checkApiKey() {
            const key = localStorage.getItem('gemini_api_key');
            if (key && key.trim() !== '') {
                elApiSetupMain.classList.add('hidden');
                elAppMain.classList.remove('hidden');
                changeKeyBtn.style.display = 'inline';
            } else {
                elApiSetupMain.classList.remove('hidden');
                elAppMain.classList.add('hidden');
                changeKeyBtn.style.display = 'none';
            }
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                checkApiKey();
            } else {
                alert("Please enter a valid API key.");
            }
        });

        changeKeyBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to remove your API key?")) {
                localStorage.removeItem('gemini_api_key');
                apiKeyInput.value = '';
                checkApiKey();
            }
        });

        // Run check on load
        checkApiKey();

        // Check Symptoms functionality
        async function handleCheck(validate = true) {
            const text = symptomInput.value.trim();
            
            if (validate && text.length === 0) {
                alert(isTamil ? dict.ta.emptyInputError : dict.en.emptyInputError);
                symptomInput.focus();
                return;
            }

            // Show loading state
            adviceText.textContent = isTamil ? dict.ta.urgencyWait : dict.en.urgencyWait;
            urgencyBadge.className = 'badge'; 
            urgencyBadge.innerHTML = '...';
            resultsSection.classList.remove('hidden');
            resultsSection.classList.remove('fade-in');
            void resultsSection.offsetWidth;
            resultsSection.classList.add('fade-in');
            
            let result;
            const apiKey = localStorage.getItem('gemini_api_key');
            
            try {
                if (!apiKey) throw new Error('API key missing. Please reset key.');
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { 
                            parts: [{ text: SYSTEM_PROMPT }] 
                        },
                        contents: [{ 
                            parts: [{ text: `User symptoms (${isTamil ? 'Please reply in Tamil' : 'Please reply in English'}): ${text}` }] 
                        }]
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const aiAdvice = data.candidates[0].content.parts[0].text;
                    const mockResult = getMockResult(text); // Fallback for badges
                    result = { type: mockResult.type, level: mockResult.level, advice: aiAdvice };
                } else {
                    const data = await response.json();
                    throw new Error(data.error?.message || 'API Error: Verify your API key.');
                }
            } catch(e) {
                console.error("Gemini API Error", e);
                // On error, show error message
                result = { 
                    type: 'clinic', 
                    level: 'Error Check Failed', 
                    advice: `❌ ${e.message}\n\nPlease verify your API key by clicking "Change API Key" in the footer, or check your connection.` 
                };
            }

            // Apply exact classes
            urgencyBadge.className = 'badge'; // reset
            urgencyBadge.classList.add(result.type);
            
            // Add icon based on type
            let icon = '';
            if (result.type === 'emergency') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
            if (result.type === 'clinic') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            if (result.type === 'home') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';

            urgencyBadge.innerHTML = `${icon} ${result.level}`;
            adviceText.textContent = result.advice;

            // Show results section
            resultsSection.classList.remove('hidden');
            
            // Trigger reflow to restart animation
            void resultsSection.offsetWidth;
            
            resultsSection.classList.add('fade-in');
            
            // Scroll to results smoothly
            if (validate) {
                setTimeout(() => {
                    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 50);
            }
        }

        checkBtn.addEventListener('click', () => handleCheck(true));

        // Start Over functionality
        resetBtn.addEventListener('click', () => {
            symptomInput.value = '';
            resultsSection.classList.add('hidden');
            resultsSection.classList.remove('fade-in');
            symptomInput.focus();
        });
    </script>
</body>
</html>
